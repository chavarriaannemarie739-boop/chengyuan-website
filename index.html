<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="聊城市茌平区诚远汽车零部件制造有限公司 — 专注汽车散热器研发、生产与销售，以精湛工艺和卓越品质，为全球客户提供可靠的汽车热管理解决方案。">
  <meta name="keywords" content="汽车散热器,汽车零部件,散热系统,铝制散热器,铜制散热器,中冷器,油冷器,暖风散热器,诚远汽车零部件">
  <meta name="author" content="聊城市茌平区诚远汽车零部件制造有限公司">
  <meta property="og:title" content="诚远汽车零部件 — 专业汽车散热器制造商">
  <meta property="og:description" content="集研发、生产、销售于一体，为全球客户提供高品质汽车散热系统解决方案。">
  <meta property="og:type" content="website">
  <title>诚远汽车零部件 — 专业汽车散热器制造商</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== 1. Hero Section ========== -->
  <section class="hero" id="hero">
    <div class="hero__bg-pattern"></div>
    <div class="hero__gradient-orb hero__gradient-orb--1"></div>
    <div class="hero__gradient-orb hero__gradient-orb--2"></div>

    <div class="container" style="display:flex;align-items:center;width:100%;position:relative;z-index:2;">
      <div class="hero__content" id="hero-content">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="hero__visual" id="hero-visual">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- ========== 2. About Preview Section ========== -->
  <section class="section" id="about-preview">
    <div class="container">
      <div class="about-intro">
        <div class="reveal">
          <div class="section-label">关于我们</div>
          <h2 class="section-title" id="about-title">值得信赖的<span class="text-accent">散热系统</span>制造商</h2>
          <p class="section-subtitle" id="about-description" style="max-width:100%;">
            <!-- Populated by JS -->
          </p>
          <div style="margin-top:var(--space-8);">
            <a href="about.html" class="btn btn-primary">了解更多<span style="margin-left:4px;">→</span></a>
          </div>
        </div>
        <div class="reveal reveal--delay-2">
          <div class="about-intro__image" id="about-image">
            <div class="img-placeholder" style="width:100%;height:100%;">
              <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span>企业形象图</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== 3. Advantages Section ========== -->
  <section class="section section--gray" id="advantages">
    <div class="container">
      <div class="section-header text-center reveal">
        <div class="section-label" style="justify-content:center;">核心优势</div>
        <h2 class="section-title">为什么选择<span class="text-accent">诚远</span></h2>
        <p class="section-subtitle" style="margin:0 auto;">多年深耕汽车散热器领域，以先进技术和优质服务赢得客户信赖</p>
      </div>
      <div class="grid-4" id="advantages-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ========== 4. Products Preview Section ========== -->
  <section class="section" id="products-preview">
    <div class="container">
      <div class="section-header text-center reveal">
        <div class="section-label" style="justify-content:center;">产品中心</div>
        <h2 class="section-title">我们的<span class="text-accent">核心产品</span></h2>
        <p class="section-subtitle" style="margin:0 auto;">涵盖乘用车、商用车、工程机械等多种散热系统解决方案</p>
      </div>
      <div class="grid-3" id="products-grid">
        <!-- Populated by JS -->
      </div>
      <div class="text-center reveal" style="margin-top:var(--space-12);">
        <a href="products.html" class="btn btn-outline btn-lg">查看全部产品<span style="margin-left:4px;">→</span></a>
      </div>
    </div>
  </section>

  <!-- ========== 5. Stats Bar Section ========== -->
  <section class="section section--accent-gradient" id="stats-section">
    <div class="container">
      <div class="stats-bar" id="stats-bar">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ========== 6. News Preview Section ========== -->
  <section class="section section--gray" id="news-preview">
    <div class="container">
      <div class="section-header text-center reveal">
        <div class="section-label" style="justify-content:center;">新闻动态</div>
        <h2 class="section-title">最新<span class="text-accent">资讯</span></h2>
        <p class="section-subtitle" style="margin:0 auto;">了解诚远汽车零部件的最新动态和行业资讯</p>
      </div>
      <div class="grid-3" id="news-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ========== 7. Partners Section ========== -->
  <section class="section section--dark" id="partners">
    <div class="container">
      <div class="section-header text-center reveal">
        <div class="section-label" style="justify-content:center;">合作伙伴</div>
        <h2 class="section-title">值得信赖的<span class="text-accent">合作伙伴</span></h2>
        <p class="section-subtitle" style="margin:0 auto;">与众多行业伙伴建立长期稳定的合作关系</p>
      </div>
      <div class="partners-grid reveal" id="partners-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ========== 8. CTA Section ========== -->
  <section class="cta" id="cta">
    <div class="cta__bg"></div>
    <div class="container">
      <div class="cta__content reveal">
        <h2 class="cta__title">期待与您的合作</h2>
        <p class="cta__desc">无论您需要标准产品还是定制化散热解决方案，我们的专业团队随时为您服务。</p>
        <a href="contact.html" class="btn btn-primary btn-lg">联系我们<span style="margin-left:4px;">→</span></a>
      </div>
    </div>
  </section>

  <!-- ========== Scripts ========== -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    (async function () {
      await CMS.loadData();
      const data = window.CMS.getData();

      // --- 1. Hero Section ---
      const banner = data.banners[0] || {};
      const stats = data.stats || [];
      const heroContent = document.getElementById('hero-content');

      const statsHTML = stats.map(s =>
        `<div class="hero__stat">
          <div class="hero__stat-number">
            <span data-count="${s.number}">0</span><span>${s.unit}</span>
          </div>
          <div class="hero__stat-label">${s.label}</div>
        </div>`
      ).join('');

      heroContent.innerHTML = `
        <div class="hero__label">🏭 ${banner.subtitle || data.company.slogan}</div>
        <h1 class="hero__title">专业<span class="highlight">汽车散热器</span><br>制造商</h1>
        <p class="hero__desc">${banner.description || data.company.description}</p>
        <div class="hero__actions">
          <a href="products.html" class="btn btn-primary btn-lg">产品中心<span style="margin-left:4px;">→</span></a>
          <a href="contact.html" class="btn btn-outline btn-lg" style="border-color:rgba(255,255,255,0.3);color:var(--color-white);">联系我们</a>
        </div>
        <div class="hero__stats">${statsHTML}</div>
      `;

      // Hero visual placeholder
      const heroVisual = document.getElementById('hero-visual');
      if (banner.image) {
        heroVisual.innerHTML = `<div class="hero__visual-placeholder"><img src="${banner.image}" alt="${banner.title}"></div>`;
      } else {
        heroVisual.innerHTML = `
          <div class="hero__visual-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span style="font-size:14px;">产品展示图</span>
          </div>
        `;
      }

      // --- 2. About Preview ---
      document.getElementById('about-description').textContent = data.company.descriptionLong || data.company.description;

      // --- 3. Advantages ---
      const advantagesGrid = document.getElementById('advantages-grid');
      advantagesGrid.innerHTML = data.advantages.map((adv, i) =>
        `<div class="feature-card reveal reveal--delay-${i + 1}">
          <div class="feature-card__icon">${adv.icon}</div>
          <h3 class="feature-card__title">${adv.title}</h3>
          <p class="feature-card__desc">${adv.description}</p>
        </div>`
      ).join('');

      // --- 4. Products Preview (first 3) ---
      const productsGrid = document.getElementById('products-grid');
      const previewProducts = data.products.slice(0, 3);
      productsGrid.innerHTML = previewProducts.map((prod, i) => {
        const imageArea = prod.image
          ? `<img src="${prod.image}" alt="${prod.name}">`
          : `<div class="card__image-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span>暂无图片</span>
            </div>`;

        return `<div class="card reveal reveal--delay-${i + 1}">
          <div class="card__image">${imageArea}</div>
          <div class="card__body">
            <span class="card__tag">${prod.category}</span>
            <h3 class="card__title">${prod.name}</h3>
            <p class="card__desc">${prod.description}</p>
            <a href="products.html" class="card__link">查看详情 ${ICONS.arrowRight}</a>
          </div>
        </div>`;
      }).join('');

      // --- 5. Stats Bar ---
      const statsBar = document.getElementById('stats-bar');
      statsBar.innerHTML = stats.map((s, i) =>
        `<div class="stats-bar__item reveal reveal--delay-${i + 1}">
          <div class="stats-bar__number">
            <span data-count="${s.number}">0</span><span class="unit">${s.unit}</span>
          </div>
          <div class="stats-bar__label">${s.label}</div>
        </div>`
      ).join('');

      // --- 6. News Preview (latest 3) ---
      const newsGrid = document.getElementById('news-grid');
      const previewNews = data.news.slice(0, 3);
      newsGrid.innerHTML = previewNews.map((item, i) => {
        const dateObj = new Date(item.date);
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        const year = dateObj.getFullYear();

        const imageArea = item.image
          ? `<img src="${item.image}" alt="${item.title}">`
          : `<div class="card__image-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span>暂无图片</span>
            </div>`;

        return `<div class="card reveal reveal--delay-${i + 1}">
          <div class="card__image">${imageArea}</div>
          <div class="card__body">
            <div style="display:flex;align-items:center;gap:6px;color:var(--color-gray-400);font-size:var(--font-size-xs);margin-bottom:var(--space-3);">
              ${ICONS.clock}
              <span>${year}-${month}-${day}</span>
            </div>
            <h3 class="card__title" style="font-size:var(--font-size-lg);">${item.title}</h3>
            <p class="card__desc">${item.summary}</p>
            <a href="#" class="card__link">阅读全文 ${ICONS.arrowRight}</a>
          </div>
        </div>`;
      }).join('');

      // --- 7. Partners ---
      const partnersGrid = document.getElementById('partners-grid');
      partnersGrid.innerHTML = data.partners.map(p =>
        `<div class="partner-logo">${p.name}</div>`
      ).join('');

    })();

    // Initialize shared header, footer, scroll effects
    initPage();
  </script>

</body>
</html>
