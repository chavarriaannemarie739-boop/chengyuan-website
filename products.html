<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="诚远汽车零部件产品中心 — 专业汽车散热器、中冷器、油冷器等汽车热管理产品，适用于乘用车、商用车及工程机械。">
  <meta name="keywords" content="汽车散热器,散热器厂家,中冷器,油冷器,暖风散热器,乘用车散热器,商用车散热器,工程机械散热器">
  <title>产品中心 - 诚远汽车零部件</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================================================
       1. PAGE HERO (.hero--small)
       ============================================================ -->
  <section class="hero hero--small">
    <div class="hero__bg-pattern"></div>
    <div class="hero__gradient-orb hero__gradient-orb--1"></div>
    <div class="hero__gradient-orb hero__gradient-orb--2"></div>
    <div class="container" style="position:relative;z-index:2;">
      <nav class="breadcrumb" aria-label="面包屑导航">
        <a href="index.html">首页</a>
        <span class="separator">/</span>
        <span class="current">产品中心</span>
      </nav>
      <h1 class="hero__title" style="opacity:1;">产品中心</h1>
      <p class="hero__desc" style="opacity:1;">专业汽车散热系统制造商，涵盖乘用车、商用车及工程机械全系列散热产品</p>
    </div>
  </section>

  <!-- ============================================================
       2. PRODUCTS SECTION
       ============================================================ -->
  <section class="section" id="products-section">
    <div class="container">
      <!-- Section Header -->
      <div class="section-header text-center reveal">
        <span class="section-label">OUR PRODUCTS</span>
        <h2 class="section-title">全系列散热产品</h2>
        <p class="section-subtitle" style="margin:0 auto;">精工品质，为您提供高性能、高可靠性的汽车热管理解决方案</p>
      </div>

      <!-- Category Filter Buttons -->
      <div class="products-filter reveal" id="products-filter" role="tablist" aria-label="产品分类筛选">
        <!-- Buttons will be rendered by JS from CMS productCategories -->
      </div>

      <!-- Products Grid -->
      <div class="grid-3" id="products-grid">
        <!-- Product cards will be rendered by JS from CMS products -->
      </div>
    </div>
  </section>

  <!-- ============================================================
       3. CTA SECTION
       ============================================================ -->
  <section class="cta reveal">
    <div class="cta__bg"></div>
    <div class="container">
      <div class="cta__content">
        <h2 class="cta__title">需要定制散热方案？</h2>
        <p class="cta__desc">我们提供专业的散热系统定制服务，根据您的车型和工况需求，量身打造最优解决方案。</p>
        <div class="flex justify-center gap-4">
          <a href="contact.html" class="btn btn-primary btn-lg">联系我们</a>
          <a href="tel:138-XXXX-XXXX" class="btn btn-outline btn-lg" style="border-color:rgba(255,255,255,0.4);color:var(--color-white);">
            <span style="display:inline-flex;align-items:center;gap:6px;">📞 电话咨询</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- ============================================================
       PRODUCT DETAIL MODAL
       ============================================================ -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal__header">
        <h3 class="modal__title" id="modal-title"></h3>
        <button class="modal__close" id="modal-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal__body" id="modal-body">
        <!-- Modal content rendered by JS -->
      </div>
    </div>
  </div>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    // ============================================================
    //  Products Page Logic
    // ============================================================
    (async function () {
      'use strict';

      await CMS.loadData();

      const data       = CMS.getData();
      const products   = data.products   || [];
      const categories = data.productCategories || ['全部'];
      const company    = data.company    || {};

      // Update CTA phone link dynamically
      const ctaPhoneLink = document.querySelector('.cta a[href^="tel:"]');
      if (ctaPhoneLink && company.mobile) {
        ctaPhoneLink.href = 'tel:' + company.mobile.replace(/-/g, '');
      }

      // ---------- Render Filter Buttons ----------
      const filterContainer = document.getElementById('products-filter');

      categories.forEach((cat, idx) => {
        const btn = document.createElement('button');
        btn.className = 'products-filter__btn' + (idx === 0 ? ' products-filter__btn--active' : '');
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', idx === 0 ? 'true' : 'false');
        btn.dataset.category = cat;
        btn.textContent = cat;
        filterContainer.appendChild(btn);
      });

      // ---------- Render Product Cards ----------
      const gridContainer = document.getElementById('products-grid');

      function createProductCard(product, delayIdx) {
        const card = document.createElement('div');
        card.className = 'card reveal reveal--delay-' + ((delayIdx % 3) + 1);
        card.dataset.category = product.category || '';
        card.dataset.productId = product.id || '';
        card.style.cursor = 'pointer';

        // Image or placeholder
        let imageHTML;
        if (product.image) {
          imageHTML = '<img src="' + product.image + '" alt="' + (product.name || '') + '">';
        } else {
          imageHTML = '<div class="card__image-placeholder">' +
            ICONS.image +
            '<span>' + (product.name || '暂无图片') + '</span></div>';
        }

        // Hot badge
        const badgeHTML = product.isHot
          ? '<span style="position:absolute;top:12px;right:12px;padding:4px 12px;background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;font-size:12px;font-weight:700;border-radius:20px;letter-spacing:1px;z-index:2;box-shadow:0 2px 8px rgba(239,68,68,0.4);">🔥 热销</span>'
          : '';

        // Features list
        let featuresHTML = '';
        if (product.features && product.features.length) {
          featuresHTML = '<ul style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">';
          product.features.forEach(f => {
            featuresHTML += '<li style="padding:2px 10px;background:var(--color-gray-50);border:1px solid var(--color-gray-200);border-radius:20px;font-size:12px;color:var(--color-gray-600);">' + f + '</li>';
          });
          featuresHTML += '</ul>';
        }

        card.innerHTML =
          '<div class="card__image">' +
            badgeHTML +
            imageHTML +
          '</div>' +
          '<div class="card__body">' +
            '<span class="card__tag">' + (product.category || '未分类') + '</span>' +
            '<h3 class="card__title">' + (product.name || '产品名称') + '</h3>' +
            '<p class="card__desc">' + (product.description || '') + '</p>' +
            featuresHTML +
            '<span class="card__link">查看详情 ' + ICONS.arrowRight + '</span>' +
          '</div>';

        // Click to open modal
        card.addEventListener('click', () => openModal(product));

        return card;
      }

      function renderProducts(filterCategory) {
        gridContainer.innerHTML = '';

        const filtered = filterCategory === '全部'
          ? products
          : products.filter(p => p.category === filterCategory);

        if (filtered.length === 0) {
          gridContainer.innerHTML =
            '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--color-gray-400);">' +
              '<p style="font-size:48px;margin-bottom:16px;">📭</p>' +
              '<p style="font-size:18px;font-weight:500;">暂无该分类的产品</p>' +
              '<p style="font-size:14px;margin-top:8px;">请选择其他分类或联系我们了解更多</p>' +
            '</div>';
          return;
        }

        filtered.forEach((product, idx) => {
          gridContainer.appendChild(createProductCard(product, idx));
        });

        // Re-trigger reveal animations for newly added cards
        initRevealAnimations();
      }

      // Initial render — show all products
      renderProducts('全部');

      // ---------- Filter Button Click Handlers ----------
      filterContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('.products-filter__btn');
        if (!btn) return;

        // Update active button
        filterContainer.querySelectorAll('.products-filter__btn').forEach(b => {
          b.classList.remove('products-filter__btn--active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('products-filter__btn--active');
        btn.setAttribute('aria-selected', 'true');

        // Filter products
        renderProducts(btn.dataset.category);
      });

      // ---------- Product Detail Modal ----------
      const modalOverlay = document.getElementById('product-modal');
      const modalTitle   = document.getElementById('modal-title');
      const modalBody    = document.getElementById('modal-body');
      const modalClose   = document.getElementById('modal-close');

      function openModal(product) {
        // Image
        let modalImageHTML;
        if (product.image) {
          modalImageHTML = '<img src="' + product.image + '" alt="' + (product.name || '') + '" style="width:100%;height:260px;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:20px;">';
        } else {
          modalImageHTML = '<div style="width:100%;height:260px;background:linear-gradient(135deg,var(--color-gray-100),var(--color-gray-200));border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--color-gray-400);margin-bottom:20px;">' +
            ICONS.image +
            '<span style="font-size:14px;">' + (product.name || '暂无图片') + '</span></div>';
        }

        // Category tag + hot badge
        const tagHTML = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">' +
          '<span class="card__tag">' + (product.category || '') + '</span>' +
          (product.isHot ? '<span style="padding:2px 10px;background:#FEE2E2;color:#DC2626;font-size:12px;font-weight:600;border-radius:20px;">🔥 热销产品</span>' : '') +
          '</div>';

        // Description
        const descHTML = '<p style="color:var(--color-gray-600);line-height:1.8;margin-bottom:20px;">' + (product.description || '') + '</p>';

        // Features
        let featuresHTML = '';
        if (product.features && product.features.length) {
          featuresHTML = '<div style="margin-bottom:20px;">' +
            '<h4 style="font-size:14px;font-weight:700;color:var(--color-gray-900);margin-bottom:12px;">产品特点</h4>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
          product.features.forEach(f => {
            featuresHTML += '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--color-gray-50);border-radius:var(--radius-md);font-size:14px;color:var(--color-gray-700);">' +
              '<span style="color:var(--color-accent);font-weight:700;">✓</span>' + f +
              '</div>';
          });
          featuresHTML += '</div></div>';
        }

        // CTA
        const ctaHTML = '<div style="display:flex;gap:12px;padding-top:16px;border-top:1px solid var(--color-gray-200);">' +
          '<a href="contact.html" class="btn btn-primary" style="flex:1;">立即询价</a>' +
          '<a href="tel:' + (company.mobile || '').replace(/-/g, '') + '" class="btn btn-outline" style="flex:1;">电话咨询</a>' +
          '</div>';

        modalTitle.textContent = product.name || '产品详情';
        modalBody.innerHTML = modalImageHTML + tagHTML + descHTML + featuresHTML + ctaHTML;

        // Show modal
        modalOverlay.classList.add('modal-overlay--active');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        modalOverlay.classList.remove('modal-overlay--active');
        document.body.style.overflow = '';
      }

      modalClose.addEventListener('click', closeModal);

      // Close on overlay click (outside modal box)
      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
      });

      // Close on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
      });

    })();

    // ---------- Init shared page components ----------
    initPage();
  </script>

</body>
</html>
