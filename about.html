<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- SEO Meta -->
  <title>关于我们 - 诚远汽车零部件</title>
  <meta name="description" content="了解聊城市茌平区诚远汽车零部件制造有限公司 — 专注汽车散热器研发、生产与销售，以精湛工艺和卓越品质，为全球客户提供可靠的汽车热管理解决方案。">
  <meta name="keywords" content="诚远汽车零部件,关于我们,汽车散热器,散热器制造,企业介绍,发展历程,核心价值观">
  <meta name="author" content="聊城市茌平区诚远汽车零部件制造有限公司">

  <!-- Open Graph -->
  <meta property="og:title" content="关于我们 - 诚远汽车零部件">
  <meta property="og:description" content="专注汽车散热器研发、生产与销售，以精湛工艺和卓越品质，为全球客户提供可靠的汽车热管理解决方案。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">

  <!-- Favicon placeholder -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Page-specific styles -->
  <style>
    /* ---- About Intro Highlights ---- */
    .about-intro__text h2 {
      font-size: var(--font-size-4xl);
      font-weight: 700;
      color: var(--color-gray-900);
      line-height: 1.3;
      margin-bottom: var(--space-6);
    }

    .about-intro__text h2 .highlight {
      background: linear-gradient(135deg, var(--color-accent-light), var(--color-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .about-intro__text p {
      font-size: var(--font-size-base);
      color: var(--color-gray-600);
      line-height: 1.9;
      margin-bottom: var(--space-6);
    }

    .about-intro__highlights {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-top: var(--space-8);
    }

    .about-intro__highlight-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--color-gray-50);
      border-radius: var(--radius-lg);
      transition: all var(--transition-base);
    }

    .about-intro__highlight-item:hover {
      background: var(--color-white);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .about-intro__highlight-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, rgba(200,150,62,0.15), rgba(200,150,62,0.05));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .about-intro__highlight-text {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-gray-800);
      line-height: 1.5;
    }

    .about-intro__highlight-sub {
      font-size: var(--font-size-xs);
      color: var(--color-gray-500);
      font-weight: 400;
      margin-top: 2px;
    }

    /* ---- Values Section Header ---- */
    .values-section .section-header {
      text-align: center;
    }

    .values-section .section-subtitle {
      margin: 0 auto;
    }

    /* ---- Timeline Section Header ---- */
    .timeline-section .section-header {
      text-align: center;
    }

    .timeline-section .section-subtitle {
      margin: 0 auto;
    }

    .timeline-wrapper {
      max-width: 700px;
      margin: 0 auto;
    }

    /* ---- Stats divider line ---- */
    .stats-bar__item + .stats-bar__item {
      border-left: 1px solid rgba(255,255,255,0.1);
    }

    /* ---- Responsive for highlight grid ---- */
    @media (max-width: 480px) {
      .about-intro__highlights {
        grid-template-columns: 1fr;
      }

      .stats-bar__item + .stats-bar__item {
        border-left: none;
      }
    }
  </style>
</head>
<body>

  <!-- ==========================================================
       Section 1: Page Hero (.hero--small)
       ========================================================== -->
  <section class="hero hero--small">
    <div class="hero__bg-pattern"></div>
    <div class="hero__gradient-orb hero__gradient-orb--1"></div>
    <div class="hero__gradient-orb hero__gradient-orb--2"></div>
    <div class="container">
      <div class="hero__content" style="padding-top: 0;">
        <!-- Breadcrumb -->
        <nav class="breadcrumb" aria-label="面包屑导航">
          <a href="index.html">首页</a>
          <span class="separator">/</span>
          <span class="current">关于我们</span>
        </nav>
        <!-- Title -->
        <h1 class="hero__title" style="opacity:1; animation:none;">关于<span class="highlight">我们</span></h1>
        <!-- Subtitle populated from CMS -->
        <p class="hero__desc" id="hero-subtitle" style="opacity:1; animation:none;"></p>
      </div>
    </div>
  </section>

  <!-- ==========================================================
       Section 2: Company Intro
       ========================================================== -->
  <section class="section">
    <div class="container">
      <div class="about-intro">
        <!-- Left: Text Content -->
        <div class="about-intro__text reveal">
          <div class="section-label">企业简介</div>
          <h2>专注品质，<span class="highlight">驱动未来</span></h2>
          <p id="company-description"></p>
          <div class="about-intro__highlights" id="company-highlights">
            <!-- Populated by JS -->
          </div>
        </div>
        <!-- Right: Image Placeholder -->
        <div class="about-intro__image reveal reveal--delay-2" id="company-image">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ==========================================================
       Section 3: Core Values
       ========================================================== -->
  <section class="section section--gray values-section">
    <div class="container">
      <div class="section-header text-center reveal">
        <div class="section-label" style="justify-content: center;">核心价值</div>
        <h2 class="section-title">企业文化与<span class="text-accent">核心价值观</span></h2>
        <p class="section-subtitle" style="margin: 0 auto;">我们秉承的理念，驱动着每一个产品和服务的卓越品质</p>
      </div>
      <div class="about-values" id="values-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ==========================================================
       Section 4: Development History (Timeline)
       ========================================================== -->
  <section class="section timeline-section">
    <div class="container">
      <div class="section-header text-center reveal">
        <div class="section-label" style="justify-content: center;">发展历程</div>
        <h2 class="section-title">砥砺前行，<span class="text-accent">步步为营</span></h2>
        <p class="section-subtitle" style="margin: 0 auto;">从创立至今，我们不断突破自我，用实力书写每一个里程碑</p>
      </div>
      <div class="timeline-wrapper">
        <div class="timeline" id="timeline-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ==========================================================
       Section 5: Stats Bar
       ========================================================== -->
  <section class="section section--accent-gradient">
    <div class="container">
      <div class="stats-bar reveal" id="stats-bar">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ==========================================================
       Section 6: CTA Section
       ========================================================== -->
  <section class="cta">
    <div class="cta__bg"></div>
    <div class="container">
      <div class="cta__content reveal">
        <h2 class="cta__title">期待与您合作</h2>
        <p class="cta__desc">无论您有任何关于汽车散热系统的需求，我们都将竭诚为您提供专业的解决方案与优质的服务。</p>
        <div style="display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap;">
          <a href="contact.html" class="btn btn-primary btn-lg">联系我们</a>
          <a href="products.html" class="btn btn-outline btn-lg" style="border-color: rgba(255,255,255,0.3); color: var(--color-white);">浏览产品</a>
        </div>
      </div>
    </div>
  </section>

  <!-- ==========================================================
       Scripts
       ========================================================== -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      // ---- Read CMS data ----
      const company = CMS.get('company');
      const values  = CMS.get('values');
      const milestones = CMS.get('milestones');
      const stats   = CMS.get('stats');

      // ---- 1. Hero subtitle ----
      const heroSub = document.getElementById('hero-subtitle');
      if (heroSub) {
        heroSub.textContent = company.description || '';
      }

      // ---- 2. Company Intro ----
      const descEl = document.getElementById('company-description');
      if (descEl) {
        descEl.textContent = company.descriptionLong || company.description || '';
      }

      // Key highlights
      const highlightsData = [
        { icon: '🏭', title: '先进制造基地', sub: '自动化生产线，年产能10万+台' },
        { icon: '📜', title: 'ISO 9001认证', sub: '全流程质量管理体系' },
        { icon: '🔬', title: '技术研发中心', sub: '多项技术专利成果' },
        { icon: '🌍', title: '全球化布局', sub: '产品远销海内外市场' },
      ];

      const highlightsEl = document.getElementById('company-highlights');
      if (highlightsEl) {
        highlightsEl.innerHTML = highlightsData.map(h => `
          <div class="about-intro__highlight-item">
            <div class="about-intro__highlight-icon">${h.icon}</div>
            <div>
              <div class="about-intro__highlight-text">${h.title}</div>
              <div class="about-intro__highlight-sub">${h.sub}</div>
            </div>
          </div>
        `).join('');
      }

      // Company image
      const imgEl = document.getElementById('company-image');
      if (imgEl) {
        imgEl.innerHTML = getImageHTML('', '诚远汽车零部件厂区', '企业厂区图片');
      }

      // ---- 3. Core Values ----
      const valuesGrid = document.getElementById('values-grid');
      if (valuesGrid && values) {
        valuesGrid.innerHTML = values.map((v, i) => `
          <div class="feature-card reveal reveal--delay-${i + 1}">
            <div class="feature-card__icon">${v.icon}</div>
            <h3 class="feature-card__title">${v.title}</h3>
            <p class="feature-card__desc">${v.description}</p>
          </div>
        `).join('');
      }

      // ---- 4. Timeline ----
      const timelineList = document.getElementById('timeline-list');
      if (timelineList && milestones) {
        timelineList.innerHTML = milestones.map((m, i) => `
          <div class="timeline__item reveal reveal--delay-${Math.min(i + 1, 5)}">
            <div class="timeline__year">${m.year}</div>
            <h3 class="timeline__title">${m.title}</h3>
            <p class="timeline__desc">${m.description}</p>
          </div>
        `).join('');
      }

      // ---- 5. Stats Bar ----
      const statsBar = document.getElementById('stats-bar');
      if (statsBar && stats) {
        statsBar.innerHTML = stats.map(s => `
          <div class="stats-bar__item">
            <div class="stats-bar__number">
              <span data-count="${s.number}">0</span><span class="unit">${s.unit}</span>
            </div>
            <div class="stats-bar__label">${s.label}</div>
          </div>
        `).join('');
      }

      // ---- Initialize shared page components ----
      initPage();
    })();
  </script>

</body>
</html>
